minimumReleaseAge: 1440
blockExoticSubdeps: true
trustPolicy: no-downgrade

# TODO: check which can be upgraded to remove them, or check which verions are fine
trustPolicyExclude:
  - '@graphql-tools/batch-execute@9.0.19'
  - '@graphql-tools/delegate@10.2.23'
  - '@graphql-tools/executor-graphql-ws@2.0.7'
  - '@graphql-tools/executor-http@1.3.3'
  - '@graphql-tools/wrap@10.1.4'
  - eslint-config-prettier@9.1.2
  - eslint-import-resolver-typescript@3.10.1
  - semver@6.3.1
  - ua-parser-js@1.0.41

allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  sharp: false
  unrs-resolver: false

overrides:
  immutable@<3.8.3: ^3.8.3
  js-yaml@>=4.0.0 <4.1.1: '>=4.1.1'
  lodash-es@>=4.0.0 <=4.17.22: '>=4.17.23'
  lodash@>=4.0.0 <=4.17.22: '>=4.17.23'
  postcss@<8.5.10: ^8.5.10
  ws@>=8.0.0 <8.20.1: ^8.20.1

