  #         cache-dependency-path: "./web/package-lock.json"

  #     - name: Install packages
  #       run: npm ci

  #     - name: Run tests
  #       run: npm test

  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./server"
    permissions:
      contents: read
      checks: write
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          cache: true
          package_json_file: server/package.json
          cache_dependency_path: server/pnpm-lock.yaml

      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          cache: "pnpm"
          cache-dependency-path: "./server/pnpm-lock.yaml"

      - name: Install packages
        run: pnpm ci

      - name: Generate Prisma client
        run: pnpm run generate

      - name: Run Lint
        id: lint
        run: pnpm run lint:ci

      - name: Run Prettier
        id: prettier
        run: pnpm run format:check .
        # run: npx prettier --check --no-color . 2> prettier_report.txt
        if: success() || steps.lint.outcome == 'failure'

      - name: Annotate Lint results
        uses: ataylorme/eslint-annotate-action@5a8d8ab89a57679e90c32750e0f382e9d8570750 # v4 branch
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          report-json: ./server/eslint_report.json
          check-name: ESLint Report Server
        # Continue to the next step even if this fails
        continue-on-error: true
        # Run this, even if the previous step fails
        if: always()

      - name: Build
        run: pnpm run build

